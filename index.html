<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Panel</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#090b11;
    color:white;
    overflow:hidden;
    height:100vh;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center,
    rgba(0,255,255,.08),
    transparent 75%);
    pointer-events:none;
}

button{
    background:#121a26;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#24344f;
}

#heartrate{
    position:absolute;
    top:20px;
    left:20px;
    width:180px;
    padding:15px;
    border-radius:18px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
}

#heartTitle{
    font-size:14px;
    letter-spacing:2px;
    opacity:.7;
}

#heartValue{
    font-size:42px;
    font-weight:bold;
    margin-top:5px;
}

#container{
    position:absolute;
    width:760px;
    height:520px;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);

    border-radius:25px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
}

#timerDisplay{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
}

#timer{
    font-size:52px;
    font-weight:bold;
}

.timeButtons{
    margin-top:10px;
}

.timeButtons button{
    width:110px;
    height:38px;
    margin:3px;
}

#leftArrow,
#rightArrow{
    position:absolute;
    top:215px;
    width:60px;
    height:60px;
    font-size:30px;
}

#leftArrow{
    left:60px;
}

#rightArrow{
    right:120px;
}

#imageHolder{
    position:absolute;
    left:50%;
    top:135px;
    transform:translateX(-50%);
    width:240px;
    height:240px;
    overflow:hidden;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.2);
}

#imageHolder img{
    width:100%;
    height:100%;
    object-fit:cover;
}

#textHolder{
    position:absolute;
    width:100%;
    top:390px;
    text-align:center;
    font-size:24px;
}

#playSection{ 
  position:absolute; 
  width:100%; 
  bottom:25px; 
  text-align:center; }

#playPause{
    width:180px;
    height:48px;
    font-size:18px;
}

#intensityControls{
    position:absolute;
    right:0px;
    top:385px;
    width:125px;

    display:flex;
    flex-direction:column;
    align-items:center;

    left:auto;
    transform:none;
}

#buttonRow{
    display:flex;
    gap:8px;
    margin-top:8px;
}

.intensityBtn{
    width:50px;
    height:40px;
    font-size:30px;
}

#intensityValue{ 
    width:100%; 
    text-align:center; 
    margin:8px 0; 
} 

#intensityValue span{ 
    font-size:38px; 
    font-weight:bold; 
}

/* Vertical Bar */

#barContainer{
    position:absolute;
    right:35px;
    top:70px;          /* moved up */
    width:55px;
    height:280px;
    border:1px solid rgba(255,255,255,.25);
    border-radius:12px;
    overflow:hidden;
    background:rgba(255,255,255,.04);
}

#barFill{ 
    position:absolute; 
    bottom:0; 
    width:100%; 
    height:0%; 
    background:white; 
} 

#barLabel{
    position:absolute;
    right:18px;
    top:360px;         /* moved up with bar */
    width:90px;
    text-align:center;
    font-size:14px;
    opacity:.75;
}

</style>
</head>
<body>

<div id="heartrate">
    <div id="heartTitle">HEART RATE</div>
    <div id="heartValue">00</div>
    BPM
</div>

<div id="container">

    <div id="timerDisplay">
        <div id="timer">00:00</div>

        <div class="timeButtons">
            <button onclick="changeTime(-5)">−5 MIN</button>
            <button onclick="changeTime(5)">+5 MIN</button>
        </div>
    </div>

    <button id="leftArrow" onclick="changeCard(-1)">
        ◀
    </button>

    <div id="imageHolder">
        <img
        id="cardImage"
        src="https://picsum.photos/id/1015/500/500">
    </div>

    <button id="rightArrow" onclick="changeCard(1)">
        ▶
    </button>

    <div id="textHolder">
        <span id="cardText">
            Placeholder One
        </span>
    </div>

    <div id="barContainer">
        <div id="barFill"></div>
    </div>

    <div id="barLabel">
        INTENSITY
    </div>

    <div id="playSection">
        <button
        id="playPause"
        onclick="togglePlay()">
            ▶ PLAY
        </button>
    </div>

<div id="intensityControls">

    <div id="intensityValue">
        LEVEL<br>
        <span id="intensity">0</span>
    </div>

    <div id="buttonRow">

        <button
        class="intensityBtn"
        onclick="changeIntensity(-1)">
            −
        </button>

        <button
        class="intensityBtn"
        onclick="changeIntensity(1)">
            +
        </button>

    </div>

</div>
</div>

<script>

let state={
    heartrate:00,
    timer:0,
    intensity:0,
    playing:false,
    card:0
};

const cards=[
{
    img:"https://picsum.photos/id/1015/500/500",
    text:"Placeholder One"
},
{
    img:"https://picsum.photos/id/1025/500/500",
    text:"Placeholder Two"
},
{
    img:"https://picsum.photos/id/1035/500/500",
    text:"Placeholder Three"
},
{
    img:"https://picsum.photos/id/1043/500/500",
    text:"Placeholder Four"
}
];

function updateUI(){

    document.getElementById(
        "heartValue"
    ).textContent=
    state.heartrate;

    let min=
    Math.floor(state.timer/60);

    let sec=
    state.timer%60;

    document.getElementById(
        "timer"
    ).textContent=
    String(min).padStart(2,"0")
    +":"
    +String(sec).padStart(2,"0");

    document.getElementById(
        "intensity"
    ).textContent=
    state.intensity;

    document.getElementById(
        "playPause"
    ).textContent=
    state.playing ?
    "❚❚ PAUSE" :
    "▶ PLAY";

    /* Image and text ONLY update
       when changeCard() modifies
       state.card */

    document.getElementById(
        "cardImage"
    ).src=
    cards[state.card].img;

    document.getElementById(
        "cardText"
    ).textContent=
    cards[state.card].text;

    document.getElementById(
        "barFill"
    ).style.height=
    (state.intensity/20*100)+"%";

    localStorage.setItem(
        "controlPanel",
        JSON.stringify(state)
    );

}

function changeTime(amount){

    state.timer+=amount*60;

    if(state.timer<0)
        state.timer=0;

    if(state.timer>3600)
        state.timer=3600;

    updateUI();

}

function changeIntensity(amount){

    state.intensity+=amount;

    if(state.intensity<0)
        state.intensity=0;

    if(state.intensity>20)
        state.intensity=20;

    updateUI();

}

function togglePlay(){

    state.playing=
    !state.playing;

    updateUI();

}

function changeCard(direction){

    state.card+=direction;

    if(state.card<0)
        state.card=
        cards.length-1;

    if(state.card>=cards.length)
        state.card=0;

    updateUI();

}

setInterval(function(){

    if(state.playing){

        if(state.timer>0){

            state.timer--;

        }
        else{

            state.playing=false;

        }

        updateUI();

    }

},1000);


const saved=
localStorage.getItem(
    "controlPanel"
);

if(saved){

    state=
    JSON.parse(saved);

}

updateUI();







const PULSOID_TOKEN = "YOUR_TOKEN_HERE";

const socket = new WebSocket(
    `wss://dev.pulsoid.net/api/v1/data/real_time?access_token=${PULSOID_TOKEN}`
);

socket.onopen = function () {
    console.log("Pulsoid connected");
};

socket.onmessage = function (event) {

    const data = JSON.parse(event.data);

    // Pulsoid sends heart rate here:
    const hr = data?.data?.heart_rate;

    if (hr !== undefined && hr !== null) {

        state.heartrate = hr;

        document.getElementById("heartValue").textContent = hr;

        // still keep persistence if you want refresh memory
        localStorage.setItem(
            "controlPanel",
            JSON.stringify(state)
        );
    }
};

socket.onerror = function (err) {
    console.log("Pulsoid error:", err);
};

socket.onclose = function () {
    console.log("Pulsoid disconnected");
};







</script>

</body>
</html>
